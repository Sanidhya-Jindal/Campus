worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;

    # /api/alerts/ scans ~330k events and makes several LLM calls; the default
    # 60s proxy timeout would cut it off mid-flight.
    proxy_connect_timeout 75s;
    proxy_send_timeout    180s;
    proxy_read_timeout    180s;

    client_max_body_size 20m;   # face-identification uploads

    upstream django   { server 127.0.0.1:8000; }
    upstream nextjs   { server 127.0.0.1:3000; }
    upstream face     { server 127.0.0.1:8001; }
    upstream agent    { server 127.0.0.1:8090; }

    server {
        # Must match --target-port on the Container App.
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Container Apps terminates TLS; pass the original scheme through so
        # Django's SECURE_PROXY_SSL_HEADER sees https and doesn't redirect-loop.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # --- Django ---
        location /api/    { proxy_pass http://django; }
        location /users/  { proxy_pass http://django; }
        location /admin/  { proxy_pass http://django; }
        location /static/ { proxy_pass http://django; }

        # --- AI services ---
        location /chat                { proxy_pass http://agent; }
        location /identify-and-search/ { proxy_pass http://face; }

        # --- Next.js (everything else) ---
        location / { proxy_pass http://nextjs; }
    }
}
